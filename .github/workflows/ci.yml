name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  physics:
    name: Physics + BSP collision tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No dependencies: the physics suite is pure Node.
      - run: npm test

  browser:
    name: Headless WebGL smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - name: Install Playwright Chromium
        run: |
          npm i --no-save playwright@1.56.1
          npx playwright install --with-deps chromium
      - run: npm run test:browser
